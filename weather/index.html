<!DOCTYPE html>
<html lang="ru" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогноз погоды</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Nunito', sans-serif; }
      html { scroll-behavior: smooth; }
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      ::selection { background: rgba(255,255,255,0.25); color: #fff; }
      .card-glass {
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      }
      .btn-glass {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn-glass:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
      .btn-glass:active { transform: translateY(0); }
      @keyframes sunPulse {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 200, 0, 0.8)); }
        50% { transform: scale(1.1); filter: drop-shadow(0 0 40px rgba(255, 200, 0, 1)); }
      }
      @keyframes sunRays {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .sun-animation { animation: sunPulse 3s ease-in-out infinite; }
      .sun-rays { animation: sunRays 20s linear infinite; }
      @keyframes rainDrop {
        0% { transform: translateY(-100%) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(300px) translateX(-20px); opacity: 0; }
      }
      .rain-drop {
        position: absolute;
        width: 2px;
        height: 20px;
        background: linear-gradient(to bottom, transparent, #60a5fa);
        border-radius: 0 0 5px 5px;
        animation: rainDrop 1s linear infinite;
      }
      @keyframes snowFall {
        0% { transform: translateY(-100%) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
      }
      .snow-flake {
        position: absolute;
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        animation: snowFall 3s linear infinite;
        box-shadow: 0 0 5px rgba(255,255,255,0.8);
      }
      @keyframes cloudFloat {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(20px); }
      }
      .cloud-animation { animation: cloudFloat 4s ease-in-out infinite; }
      .weather-sunny { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #ea580c 100%); }
      .weather-cloudy { background: linear-gradient(135deg, #64748b 0%, #475569 50%, #334155 100%); }
      .weather-rainy { background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 50%, #1e293b 100%); }
      .weather-snowy { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%); }
      .day-card { transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.2s ease; }
      .day-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
      .hour-card { transition: transform 0.2s ease, background 0.2s ease; }
      .hour-card:hover { transform: scale(1.03); }
      .hours-scroll::-webkit-scrollbar { height: 6px; }
      .hours-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
      .hours-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
      body { box-sizing: border-box; }
    </style>
  </head>
  <body class="h-full">
    <div id="app" class="h-full">
      <div id="app-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fbbf24,#ea580c);color:#fff;font-family:'Nunito',sans-serif;padding:2rem;text-align:center;">
        <div>
          <p style="font-size:1.25rem;margin-bottom:1rem;">Завантаження…</p>
          <p style="font-size:0.9rem;opacity:0.9;">Якщо сторінка лишається порожньою: запустіть сервер з папки Pogoda (<code>npm run dev</code> або <code>run.bat</code>) і відкрийте <strong>http://localhost:5173/</strong> у браузері.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var app = document.getElementById('app');
          if (app && app.querySelector('#app-fallback')) {
            app.querySelector('#app-fallback').innerHTML = '<div style="max-width:400px;"><p style="font-size:1.1rem;margin-bottom:0.5rem;">Сайт не завантажився через сервер.</p><p style="font-size:0.95rem;">Запустіть у терміналі з папки <b>Pogoda</b>: <code>npm run dev</code>, потім відкрийте у браузері посилання з терміналу (наприклад <a href="http://localhost:5173/" style="color:#fff;text-decoration:underline;">http://localhost:5173/</a> або 5174, 5175 — якщо порт зайнятий)</p></div>';
          }
        }, 2000);
      });
    </script>
  </body>
</html>
